name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_name: release-linux-x86_64
          - name: windows-x86_64
            os: windows-latest
            artifact_name: release-windows-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config libdav1d-dev

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm --yes --no-progress
          choco install pkgconfiglite --yes --no-progress
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $pkgConfigPath = Join-Path $vcpkgRoot "installed\x64-windows-static\lib\pkgconfig"
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat")
          & (Join-Path $vcpkgRoot "vcpkg.exe") install dav1d:x64-windows-static
          if (-not (Test-Path (Join-Path $pkgConfigPath "dav1d.pc"))) {
            throw "dav1d.pc not found in $pkgConfigPath"
          }
          $env:PKG_CONFIG_PATH = $pkgConfigPath
          & pkg-config --libs --cflags dav1d 'dav1d >= 1.3.0'
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_ALL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build release binary
        run: cargo build --manifest-path xeno-edit/Cargo.toml --release --locked

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/xeno-lib-${GITHUB_REF_NAME}-linux-x86_64"
          mkdir -p "${package_dir}"
          cp "xeno-edit/target/release/xeno-edit" "${package_dir}/"
          cp README.md LICENSE NOTICE CHANGELOG.md "${package_dir}/"
          cp xeno-edit/CLI_COMMANDS.md "${package_dir}/"
          tar -czf "dist/xeno-lib-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist "xeno-lib-${GITHUB_REF_NAME}-linux-x86_64"

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "dist/xeno-lib-$env:GITHUB_REF_NAME-windows-x86_64"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item "xeno-edit/target/release/xeno-edit.exe" $packageDir
          Copy-Item README.md $packageDir
          Copy-Item LICENSE $packageDir
          Copy-Item NOTICE $packageDir
          Copy-Item CHANGELOG.md $packageDir
          Copy-Item xeno-edit/CLI_COMMANDS.md $packageDir
          Compress-Archive -Path $packageDir -DestinationPath "dist/xeno-lib-$env:GITHUB_REF_NAME-windows-x86_64.zip" -Force

      - name: Upload Linux archive
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Upload Windows archive
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -maxdepth 2 -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          generate_release_notes: true
          files: release-assets/*
