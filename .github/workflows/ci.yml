name: CI

on:
  pull_request:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-all-features:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config libdav1d-dev libopus-dev autoconf automake libtool-bin

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install nasm pkg-config dav1d opus autoconf automake libtool

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm --yes --no-progress
          choco install pkgconfiglite --yes --no-progress
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $pkgConfigPath = Join-Path $vcpkgRoot "installed\x64-windows-static\lib\pkgconfig"
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat")
          & (Join-Path $vcpkgRoot "vcpkg.exe") install dav1d:x64-windows-static
          if (-not (Test-Path (Join-Path $pkgConfigPath "dav1d.pc"))) {
            throw "dav1d.pc not found in $pkgConfigPath"
          }
          $env:PKG_CONFIG_PATH = $pkgConfigPath
          & pkg-config --libs --cflags dav1d 'dav1d >= 1.3.0'
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_ALL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          where.exe nasm
          where.exe pkg-config

      - name: Check xeno-lib all features (deny warnings)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --all-features --locked

      - name: Check xeno-edit (deny warnings)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --manifest-path xeno-edit/Cargo.toml --locked

      - name: Runtime smoke check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --manifest-path xeno-edit/Cargo.toml --release --locked
          $bin = "xeno-edit\target\release\xeno-edit.exe"
          & $bin capabilities

          $sampleMp4 = Join-Path $env:RUNNER_TEMP "smoke-sample.mp4"
          $sampleIvf = Join-Path $env:RUNNER_TEMP "smoke-sample.ivf"
          $sampleMp4RoundTrip = Join-Path $env:RUNNER_TEMP "smoke-sample-roundtrip.mp4"

          & $bin h264-encode $sampleMp4 tests\goldens\base.png tests\goldens\flip_horizontal.png --fps 2 --bitrate 500
          if (-not (Test-Path $sampleMp4)) {
            throw "Expected H.264 smoke sample was not created."
          }

          & $bin video-transcode $sampleMp4 $sampleIvf --codec av1 --max-frames 2
          if (-not (Test-Path $sampleIvf)) {
            throw "Expected AV1 transcode output was not created."
          }

          & $bin video-transcode $sampleMp4 $sampleMp4RoundTrip --codec h264 --max-frames 2
          if (-not (Test-Path $sampleMp4RoundTrip)) {
            throw "Expected H.264 round-trip transcode output was not created."
          }

  test-linux:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config libdav1d-dev libopus-dev autoconf automake libtool-bin

      - name: Run default tests
        run: cargo test --locked

      - name: Build all-feature tests
        run: cargo test --all-features --no-run --locked

  benchmark-regression:
    name: Competitive Benchmarks (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config libdav1d-dev libopus-dev autoconf automake libtool-bin ffmpeg imagemagick libvips-tools

      - name: Build xeno-edit (release)
        run: cargo build --manifest-path xeno-edit/Cargo.toml --release --locked

      - name: Run competitive benchmark suite
        run: |
          cargo run --manifest-path tools/competitive-bench/Cargo.toml --locked -- run \
            --xeno-bin xeno-edit/target/release/xeno-edit \
            --iterations 5 \
            --warmup 1 \
            --output benchmarks/competitors/results/latest.json

      - name: Gate benchmark regressions
        run: |
          cargo run --manifest-path tools/competitive-bench/Cargo.toml --locked -- gate \
            --current benchmarks/competitors/results/latest.json \
            --baseline benchmarks/competitors/baseline.json \
            --max-time-regression-pct 12 \
            --max-psnr-drop 0.15 \
            --max-ssim-drop 0.0015 \
            --max-slowdown-vs-best-pct 10 \
            --max-p95-slowdown-vs-best-pct 12 \
            --max-psnr-gap-vs-best 0.20 \
            --max-ssim-gap-vs-best 0.0015 \
            --min-psnr 35 \
            --min-ssim 0.97 \
            --require-competitors \
            --require-all-competitors

      - name: Generate Linux baseline candidate
        run: |
          cargo run --manifest-path tools/competitive-bench/Cargo.toml --locked -- update-baseline \
            --from benchmarks/competitors/results/latest.json \
            --to benchmarks/competitors/results/linux-baseline-candidate.json

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: competitive-benchmark-report
          path: |
            benchmarks/competitors/results/latest.json
            benchmarks/competitors/results/linux-baseline-candidate.json

  ffmpeg-parity:
    name: FFmpeg Parity Matrix (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install parity dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config libdav1d-dev libopus-dev autoconf automake libtool-bin ffmpeg

      - name: Build xeno-edit (release)
        run: cargo build --manifest-path xeno-edit/Cargo.toml --release --locked

      - name: Generate parity matrix and gate regressions
        run: |
          python3 tools/ffmpeg-parity/generate_matrix.py \
            --xeno-bin xeno-edit/target/release/xeno-edit \
            --spec benchmarks/ffmpeg/parity_spec.json \
            --output-json benchmarks/ffmpeg/results/latest.json \
            --output-md benchmarks/ffmpeg/results/latest.md \
            --baseline benchmarks/ffmpeg/baseline.json \
            --baseline-candidate benchmarks/ffmpeg/results/baseline-candidate.json \
            --fail-on-regression

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-parity-report
          path: |
            benchmarks/ffmpeg/results/latest.json
            benchmarks/ffmpeg/results/latest.md
            benchmarks/ffmpeg/results/baseline-candidate.json
