name: CLA Assistant

run-name: >-
  ${{ github.event_name == 'pull_request_target'
      && format('CLA / PR #{0}', github.event.pull_request.number)
      || format('CLA / {0}', github.run_number) }}

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: cla-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  cla:
    name: cla
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false

      - name: Process CLA state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLA_ALLOWLIST: emiliancristea,emilian-bnkrsys,dependabot[bot],github-actions[bot]
          CLA_DOCUMENT_URL: https://github.com/XENO-CORPORATION/xeno-lib/blob/master/CLA.md
          CLA_SIGN_TEXT: I have read the CLA Document and I hereby sign the CLA
        run: python .github/scripts/cla_assistant.py
